<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Database Management System - Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <h1>🗄️ Student Database Management System</h1>
            <p>BCA 4th Sem - HTML/JS/localStorage (No Java/DB Server)</p>
        </div>
    </header>

    <main class="app-main">
        <!-- Connect Panel -->
        <div class="connect-panel">
            <button id="connectBtn" class="btn btn-primary">Connect to DB</button>
            <div id="statusMsg"></div>
        </div>

        <!-- Input Fields -->
        <div class="input-panel">
            <div class="form-group">
                <label for="idField">ID:</label>
                <input type="number" id="idField" placeholder="Enter ID">
            </div>
            <div class="form-group">
                <label for="nameField">Name:</label>
                <input type="text" id="nameField" placeholder="Enter Name">
            </div>
            <div class="form-group">
                <label for="searchField">Search:</label>
                <input type="text" id="searchField" placeholder="Search by name">
                <button id="searchBtn" class="btn btn-secondary">Search</button>
                <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="button-panel">
            <button id="addBtn" class="btn btn-success">Add Student</button>
            <button id="updateBtn" class="btn btn-warning">Update</button>
            <button id="deleteBtn" class="btn btn-danger">Delete</button>
        </div>

        <!-- Students Table -->
        <div class="table-container">
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Dynamic rows -->
                </tbody>
            </table>
        </div>
    </main>

    <footer class="app-footer">
        <p>Recreated from Java Swing/JDBC app using basic web tech. Data persists in browser localStorage.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
